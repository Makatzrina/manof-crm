<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מנוף שירותים כלכליים — CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<style>
:root{
  --ink:#152532; --ink2:#1e3346; --panel:#ffffff; --bg:#f2f4f6;
  --gold:#c9a03a; --gold-soft:#f6edd8; --petrol:#1f6f6b; --petrol-soft:#e3f0ef;
  --line:#e3e8ec; --txt:#22313f; --muted:#7b8a97;
  --green:#1e8e5a; --green-bg:#e2f4ea; --yellow:#a97b12; --yellow-bg:#fbf1d7;
  --red:#c0392b; --red-bg:#fbe4e1; --blue:#2b6cb0; --blue-bg:#e3edf8;
  --radius:12px; --shadow:0 1px 3px rgba(21,37,50,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo','Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:14.5px;line-height:1.5}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;width:100%;color:var(--txt)}
input:focus,select:focus,textarea:focus{outline:2px solid var(--petrol);outline-offset:0;border-color:var(--petrol)}
label{font-size:12.5px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px}
.req::after{content:' *';color:var(--red)}

/* ===== Login ===== */
#loginScreen{position:fixed;inset:0;background:linear-gradient(155deg,var(--ink) 0%,var(--ink2) 55%,#274b5e 100%);display:flex;align-items:center;justify-content:center;z-index:200}
.login-card{background:#fff;border-radius:18px;padding:44px 40px;width:min(400px,92vw);box-shadow:0 20px 60px rgba(0,0,0,.35)}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.logo-mark{width:46px;height:46px;border-radius:12px;background:var(--ink);color:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:22px}
.login-card h1{font-size:21px;font-weight:800;color:var(--ink)}
.login-card .sub{color:var(--muted);font-size:13px;margin-bottom:26px}
.login-card .field{margin-bottom:14px}
.btn-login{width:100%;padding:12px;background:var(--ink);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;margin-top:8px}
.btn-login:hover{background:var(--ink2)}
.login-err{color:var(--red);font-size:13px;min-height:18px;margin-top:10px;text-align:center}
.login-hint{margin-top:18px;padding-top:14px;border-top:1px dashed var(--line);font-size:11.5px;color:var(--muted);text-align:center}

/* ===== Shell ===== */
#app{display:none;min-height:100vh}
.shell{display:flex;min-height:100vh}
.sidebar{width:228px;background:var(--ink);color:#cfd9e0;display:flex;flex-direction:column;position:fixed;top:0;bottom:0;right:0;z-index:50}
.sb-brand{display:flex;align-items:center;gap:10px;padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-brand .logo-mark{width:38px;height:38px;font-size:18px;background:rgba(255,255,255,.06)}
.sb-brand b{color:#fff;font-size:15px;display:block;line-height:1.2}
.sb-brand span{font-size:11px;color:#8fa0ad}
.nav{flex:1;padding:14px 10px;overflow-y:auto}
.nav button{display:flex;align-items:center;gap:11px;width:100%;padding:10px 12px;background:none;border:none;color:#cfd9e0;font-size:14px;border-radius:9px;margin-bottom:3px;text-align:right;position:relative}
.nav button:hover{background:rgba(255,255,255,.06);color:#fff}
.nav button.active{background:rgba(201,160,58,.14);color:#fff;font-weight:600}
.nav button.active::before{content:'';position:absolute;right:-10px;top:8px;bottom:8px;width:3px;background:var(--gold);border-radius:0 3px 3px 0}
.nav .ico{width:20px;text-align:center;font-size:16px}
.sb-user{padding:14px 16px;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.sb-user .avatar{background:var(--gold);color:var(--ink)}
.sb-user .nm{font-size:13.5px;color:#fff;font-weight:600;line-height:1.2}
.sb-user .rl{font-size:11px;color:#8fa0ad}
.sb-user button{margin-right:auto;background:none;border:1px solid rgba(255,255,255,.2);color:#cfd9e0;border-radius:7px;padding:4px 10px;font-size:12px}
.sb-user button:hover{border-color:var(--gold);color:var(--gold)}
.main{flex:1;margin-right:228px;padding:26px 30px 60px;max-width:1360px}
.page-head{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:20px}
.page-head h2{font-size:22px;font-weight:800;color:var(--ink)}
.page-head .sub{font-size:13px;color:var(--muted);margin-top:2px}

/* ===== Components ===== */
.avatar{width:32px;height:32px;border-radius:50%;background:var(--petrol);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:700;flex-shrink:0}
.avatar.sm{width:26px;height:26px;font-size:11px}
.avatars{display:flex}
.avatars .avatar{margin-left:-7px;border:2px solid #fff}
.btn{padding:9px 16px;border-radius:9px;border:none;font-size:13.5px;font-weight:600;display:inline-flex;align-items:center;gap:7px}
.btn-primary{background:var(--ink);color:#fff}
.btn-primary:hover{background:var(--ink2)}
.btn-gold{background:var(--gold);color:var(--ink)}
.btn-gold:hover{background:#b8912f}
.btn-ghost{background:#fff;border:1px solid var(--line);color:var(--txt)}
.btn-ghost:hover{border-color:var(--muted)}
.btn-danger{background:var(--red-bg);color:var(--red)}
.btn-sm{padding:5px 10px;font-size:12.5px;border-radius:7px}
.icon-btn{background:none;border:none;padding:5px 7px;border-radius:6px;font-size:15px;color:var(--muted)}
.icon-btn:hover{background:var(--bg);color:var(--ink)}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.pad{padding:18px 20px}

/* stat cards */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:20px}
.stat{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}
.stat .lbl{font-size:12.5px;color:var(--muted);font-weight:600}
.stat .val{font-size:24px;font-weight:800;color:var(--ink);margin-top:4px}
.stat .delta{font-size:12px;font-weight:600;margin-top:5px;display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px}
.delta.up{color:var(--green);background:var(--green-bg)}
.delta.down{color:var(--red);background:var(--red-bg)}
.delta.flat{color:var(--muted);background:var(--bg)}
.stat .note{font-size:11.5px;color:var(--muted);margin-top:5px}
.stat.gold-top{border-top:3px solid var(--gold)}

/* tables */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:right;padding:11px 14px;background:#f7f9fa;color:var(--muted);font-size:12px;font-weight:700;border-bottom:1px solid var(--line);white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
tbody tr:hover{background:#fafbfc}
tbody tr:last-child td{border-bottom:none}
.clickable{cursor:pointer}
.empty-state{text-align:center;padding:44px 20px;color:var(--muted)}
.empty-state .big{font-size:34px;margin-bottom:8px}

/* badges */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}
.b-green{background:var(--green-bg);color:var(--green)}
.b-yellow{background:var(--yellow-bg);color:var(--yellow)}
.b-red{background:var(--red-bg);color:var(--red)}
.b-blue{background:var(--blue-bg);color:var(--blue)}
.b-gray{background:#eef1f3;color:var(--muted)}
.b-purple{background:#eee7f8;color:#6b46c1}
.b-gold{background:var(--gold-soft);color:#8a6a1c}
.tag{display:inline-block;background:var(--petrol-soft);color:var(--petrol);border-radius:6px;padding:2px 8px;font-size:11.5px;font-weight:600;margin:2px 2px 0 0}
select.inline-status{width:auto;padding:4px 26px 4px 8px;font-size:12.5px;border-radius:20px;font-weight:600;border:1px solid var(--line);background-color:#fff}

/* toolbar */
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.toolbar input[type=text],.toolbar input[type=search]{max-width:260px}
.toolbar select{width:auto;min-width:140px}
.toolbar .spacer{flex:1}

/* dashboard grid */
.charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(430px,100%),1fr));gap:16px}
.chart-card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}
.chart-card h3{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:12px}
.chart-box{position:relative;height:260px}
.bday-banner{background:linear-gradient(90deg,var(--gold-soft),#fff);border:1px solid #ecd9a8;border-radius:var(--radius);padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:12px;font-weight:600}
.bday-banner .big{font-size:24px}
.bday-week{font-size:13px;color:var(--muted);font-weight:400;margin-top:3px}
.quick-actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}

/* modal */
.modal-back{position:fixed;inset:0;background:rgba(15,25,35,.5);display:flex;align-items:flex-start;justify-content:center;padding:5vh 16px;z-index:100;overflow-y:auto}
.modal{background:#fff;border-radius:16px;width:min(640px,100%);max-height:90vh;display:flex;flex-direction:column;box-shadow:0 24px 70px rgba(0,0,0,.3)}
.modal.wide{width:min(820px,100%)}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line)}
.modal-head h3{font-size:17px;font-weight:800;color:var(--ink)}
.modal-body{padding:20px 22px;overflow-y:auto}
.modal-foot{display:flex;justify-content:flex-start;gap:10px;padding:14px 22px;border-top:1px solid var(--line)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid .full{grid-column:1/-1}
.check-list{border:1px solid var(--line);border-radius:8px;padding:8px 10px;max-height:150px;overflow-y:auto;background:#fafbfc}
.check-list label{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:500;color:var(--txt);margin:0;padding:4px 2px;cursor:pointer}
.check-list input{width:auto}
.detail-rows .row{display:flex;justify-content:space-between;gap:14px;padding:8px 0;border-bottom:1px dashed var(--line);font-size:13.5px}
.detail-rows .row b{color:var(--ink)}
.detail-rows .row span:first-child{color:var(--muted)}
.section-title{font-size:13px;font-weight:800;color:var(--ink);margin:18px 0 8px;padding-bottom:5px;border-bottom:2px solid var(--gold-soft)}
.file-chip{display:inline-flex;align-items:center;gap:6px;background:var(--blue-bg);color:var(--blue);border-radius:8px;padding:4px 10px;font-size:12.5px;font-weight:600;cursor:pointer;border:none}

/* toast */
#toast{position:fixed;bottom:24px;right:50%;transform:translateX(50%);background:var(--ink);color:#fff;padding:11px 22px;border-radius:10px;font-size:14px;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,.3);z-index:300;display:none}
#toast.err{background:var(--red)}

/* pipeline summary */
.pipe{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.pipe .cell{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px 14px;text-align:center}
.pipe .cell .n{font-size:22px;font-weight:800;color:var(--ink)}
.pipe .cell .t{font-size:12px;color:var(--muted);font-weight:600}
.pipe .cell.hot{border-color:var(--gold);background:var(--gold-soft)}

.import-zone{border:2px dashed var(--line);border-radius:12px;padding:22px;text-align:center;color:var(--muted);background:#fafbfc}
.import-zone:hover{border-color:var(--petrol)}
.locked-note{background:var(--bg);border:1px dashed var(--line);border-radius:8px;padding:6px 12px;font-size:12px;color:var(--muted);display:inline-flex;align-items:center;gap:6px}

.tbl-wrap{-webkit-overflow-scrolling:touch}

/* mobile hamburger nav (hidden on desktop) */
.mobile-topbar{display:none}
.nav-overlay{display:none}
.hamburger{background:none;border:none;color:#fff;font-size:24px;line-height:1;padding:4px 10px;border-radius:8px}
.hamburger:hover{background:rgba(255,255,255,.1)}

@media (max-width:860px){
  .mobile-topbar{display:flex;align-items:center;gap:12px;position:fixed;top:0;right:0;left:0;height:54px;background:var(--ink);color:#fff;padding:0 10px;z-index:55;box-shadow:0 2px 10px rgba(0,0,0,.22)}
  .mtb-brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:15.5px}
  .mtb-brand .logo-mark{width:32px;height:32px;font-size:16px;background:rgba(255,255,255,.08)}
  .nav-overlay.show{display:block;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:60}
  .sidebar{width:272px;max-width:82vw;height:100%;top:0;bottom:0;right:0;position:fixed;flex-direction:column;padding:0;transform:translateX(100%);transition:transform .25s ease;z-index:70;box-shadow:none}
  .sidebar.open{transform:translateX(0);box-shadow:-6px 0 26px rgba(0,0,0,.32)}
  .nav{display:block;flex:1;padding:14px 10px;overflow-y:auto;gap:0}
  .nav button{flex-direction:row;gap:11px;font-size:14.5px;padding:12px 12px;min-width:0;justify-content:flex-start;text-align:right}
  .nav .ico{font-size:18px;width:20px}
  .main{margin-right:0;padding:64px 16px 28px}
  .form-grid{grid-template-columns:1fr}
}

/* ===== Phone layout ===== */
@media (max-width:680px){
  body{font-size:14px}
  .main{padding:60px 12px 28px}
  .page-head{margin-bottom:16px}
  .page-head h2{font-size:19px}
  .page-head>.btn,.page-head button.btn{width:100%;justify-content:center}
  .toolbar{gap:8px}
  .toolbar input[type=text],.toolbar input[type=search],.toolbar select{max-width:none;width:100%;min-width:0}
  .quick-actions{gap:8px}
  .quick-actions .btn{flex:1 1 44%;justify-content:center}
  .stats{grid-template-columns:1fr 1fr;gap:10px}
  .stat{padding:13px 14px}
  .stat .val{font-size:20px}
  .pipe{grid-template-columns:1fr 1fr;gap:8px}
  .charts-grid{gap:12px}
  .chart-box{height:220px}
  .btn{padding:10px 16px}

  /* Tables become cards */
  .tbl-wrap{overflow-x:visible;border:none!important;box-shadow:none!important;background:transparent!important}
  .tbl-wrap table{display:block;font-size:14px}
  .tbl-wrap thead{display:none}
  .tbl-wrap tbody{display:block}
  .tbl-wrap tr{display:block;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:4px 14px;margin-bottom:12px}
  .tbl-wrap td{display:block;padding:9px 0;border-bottom:1px solid var(--line);white-space:normal;text-align:right}
  .tbl-wrap tr td:last-child{border-bottom:none}
  .tbl-wrap td::before{content:attr(data-label);display:block;font-weight:700;color:var(--muted);font-size:11.5px;margin-bottom:3px}
  .tbl-wrap td:not([data-label])::before{content:none}
  .tbl-wrap td[colspan]{text-align:center}
  .tbl-wrap td[colspan]::before{content:none}
  .tbl-wrap td .icon-btn{font-size:19px;padding:7px 12px}
  select.inline-status{padding:7px 26px 7px 10px;font-size:13.5px}

  /* Modals near full-screen, reachable footer */
  .modal-back{padding:0}
  .modal,.modal.wide{width:100%;max-width:100%;min-height:100vh;max-height:100vh;border-radius:0}
  .modal-body{padding:16px}
  .modal-head{padding:14px 16px}
  .modal-foot{padding:12px 16px;flex-wrap:wrap;padding-bottom:calc(12px + env(safe-area-inset-bottom))}
  .modal-foot .btn{flex:1;justify-content:center}
}
@media print{.sidebar{display:none}.main{margin:0}}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-mark">מ</div>
      <div>
        <h1>מנוף שירותים כלכליים</h1>
      </div>
    </div>
    <div class="sub">מערכת CRM — כניסה למשתמשים מורשים בלבד</div>
    <div class="field"><label class="req">אימייל</label><input type="email" id="loginEmail" placeholder="name@manof4biz.co.il" dir="ltr" style="text-align:left"></div>
    <div class="field"><label class="req">סיסמה</label><input type="password" id="loginPass" placeholder="••••••" dir="ltr" style="text-align:left"></div>
    <button class="btn-login" onclick="doLogin()">כניסה למערכת</button>
    <div class="login-err" id="loginErr"></div>
    <div class="login-hint">מערכת פנימית של מנוף שירותים כלכליים · לקבלת גישה יש לפנות להנהלה</div>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app">
<header class="mobile-topbar">
  <button class="hamburger" onclick="toggleNav()" aria-label="פתח תפריט">☰</button>
  <div class="mtb-brand"><div class="logo-mark">מ</div><span>מנוף CRM</span></div>
</header>
<div class="nav-overlay" id="navOverlay" onclick="closeNav()"></div>
<div class="shell">
  <aside class="sidebar" id="sidebar">
    <div class="sb-brand">
      <div class="logo-mark">מ</div>
      <div><b>מנוף CRM</b><span>שירותים כלכליים</span></div>
    </div>
    <nav class="nav" id="navMenu"></nav>
    <div class="sb-user" id="sbUser"></div>
  </aside>
  <main class="main" id="main"></main>
</div>
</div>

<div id="toast"></div>
<div id="modalRoot"></div>

<script>
/* ================= CORE: users, state, storage ================= */
/* ==== חיבור Supabase — מדביקים כאן את הפרטים מהפרויקט (Settings → API) ==== */
const SUPABASE_URL='https://lnlrbpgfszgavjncdzge.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxubHJicGdmc3pnYXZqbmNkemdlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMzI1MjUsImV4cCI6MjA5OTcwODUyNX0.R1ZEFoO18k0zwxsLAjVCE-ceCiblDbnnNpLeZutnFyE';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
let session=null, tab='dashboard', period='all';
let charts=[];

function todayISO(){return new Date().toISOString().slice(0,10)}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function fmtMoney(n){return '₪'+(Number(n)||0).toLocaleString('he-IL',{maximumFractionDigits:0})}
function fmtNum(n){return (Number(n)||0).toLocaleString('he-IL',{maximumFractionDigits:2})}
function fmtDate(d){if(!d)return '—';const p=d.split('-');return p.length===3?`${p[2]}.${p[1]}.${p[0]}`:d}
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function initials(name){const p=(name||'').trim().split(/\s+/);return (p[0]?.[0]||'')+(p[1]?.[0]||'')}

let state={employees:[],clients:[],leads:[],candidates:[],hours:[],payments:[],vacations:[]};

/* ==== שכבת נתונים: Supabase ==== */
const DATE_FIELDS=['birthDate','startDate','endDate','contractDate','date'];
const NUM_FIELDS=['salary','bonus','hours','amount','monthlyCost','experience'];
const FIELD_MAP={
  employees:{firstName:'first_name',lastName:'last_name',birthDate:'birth_date',startDate:'start_date'},
  clients:{birthDate:'birth_date',monthlyCost:'monthly_cost',contractDate:'contract_date',contractFile:'contract_file'},
  leads:{},
  candidates:{cvFile:'cv_file'},
  hours:{employeeId:'employee_id',clientId:'client_id'},
  payments:{clientId:'client_id'},
  vacations:{employeeId:'employee_id',startDate:'start_date',endDate:'end_date'}
};
function toDb(table,obj){
  const map=FIELD_MAP[table]||{}, out={};
  for(const k in obj){
    if(table==='employees'&&(k==='salary'||k==='bonus'))continue; /* נשמר בטבלת שכר נפרדת ומאובטחת */
    let v=obj[k];
    if(DATE_FIELDS.includes(k)&&v==='')v=null;
    out[map[k]||k]=v;
  }
  return out;
}
function fromDb(table,row){
  const map=FIELD_MAP[table]||{}, inv={}, out={};
  for(const k in map)inv[map[k]]=k;
  for(const k in row){
    const key=inv[k]||k;
    let v=row[k];
    if(NUM_FIELDS.includes(key)&&v!=null)v=Number(v);
    if(v===null&&DATE_FIELDS.includes(key))v='';
    out[key]=v;
  }
  if(table==='clients'&&!out.team)out.team=[];
  if(table==='candidates'&&!out.skills)out.skills=[];
  return out;
}
function bg(p){Promise.resolve(p).catch(e=>{console.error(e);toast('שגיאת סנכרון מול השרת: '+(e.message||e),'err');loadAll().then(render)})}
async function dbInsert(table,obj){
  const {error}=await sb.from(table).insert(toDb(table,obj));
  if(error)throw error;
  if(table==='employees'&&isAdmin()){
    const {error:e2}=await sb.from('employee_salaries').upsert({employee_id:obj.id,salary:obj.salary||0,bonus:obj.bonus||0});
    if(e2)throw e2;
  }
}
async function dbUpdate(table,id,obj){
  const body=toDb(table,obj);
  if(Object.keys(body).length){
    const {error}=await sb.from(table).update(body).eq('id',id);
    if(error)throw error;
  }
  if(table==='employees'&&isAdmin()&&(('salary' in obj)||('bonus' in obj))){
    const {error:e2}=await sb.from('employee_salaries').upsert({employee_id:id,salary:obj.salary||0,bonus:obj.bonus||0});
    if(e2)throw e2;
  }
}
async function dbDelete(table,id){
  const {error}=await sb.from(table).delete().eq('id',id);
  if(error)throw error;
}
async function dbBulkInsert(table,arr){
  if(!arr.length)return;
  const {error}=await sb.from(table).insert(arr.map(o=>toDb(table,o)));
  if(error)throw error;
}
async function loadAll(){
  if(can('users','view'))await loadAppUsers();
  const tables=['employees','clients','leads','candidates','hours','payments','vacations'];
  await Promise.all(tables.map(async t=>{
    const {data,error}=await sb.from(t).select('*');
    state[t]=(error||!data)?[]:data.map(r=>fromDb(t,r));
  }));
  if(isAdmin()){
    const {data}=await sb.from('employee_salaries').select('*');
    (data||[]).forEach(s=>{const e=state.employees.find(x=>x.id===s.employee_id);if(e){e.salary=Number(s.salary)||0;e.bonus=Number(s.bonus)||0}});
  }
}

function defaultPerms(role){return JSON.parse(JSON.stringify(ROLES[role]?.perms||ROLES['עובד'].perms))}
function can(mod,action){
  if(!session||!session.perms)return false;
  const m=session.perms[mod];
  if(m===undefined)return false;
  if(typeof m==='boolean')return m;
  return !!m[action||'view'];
}

async function doLogin(){
  const em=document.getElementById('loginEmail').value.trim().toLowerCase();
  const pw=document.getElementById('loginPass').value;
  const errEl=document.getElementById('loginErr');
  if(SUPABASE_URL.startsWith('PASTE')){errEl.textContent='המערכת טרם חוברה ל-Supabase — יש למלא את פרטי החיבור בראש הקובץ.';return}
  errEl.textContent='מתחבר…';
  const {data,error}=await sb.auth.signInWithPassword({email:em,password:pw});
  if(error||!data?.user){errEl.textContent='אימייל או סיסמה שגויים. הכניסה למשתמשים מוגדרים בלבד.';return}
  errEl.textContent='';
  await initSession(em);
}
async function initSession(em){
  const {data:u}=await sb.from('app_users').select('*').eq('email',em).maybeSingle();
  if(!u){document.getElementById('loginErr').textContent='המשתמש אינו מוגדר במערכת. יש לפנות לאדמין.';return}
  if(u.status==='מושבת'){document.getElementById('loginErr').textContent='החשבון מושבת. יש לפנות להנהלה.';return}
  const role=u.role||'עובד';
  const perms=u.permissions?JSON.parse(u.permissions):defaultPerms(role);
  session={email:em,name:u.name||em.split('@')[0],role,perms,userId:u.id};
  await enterApp();
}

function monthLabel(m){const [y,mm]=m.split('-');const names=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];return names[+mm-1]+' '+y}

function daysToBirthday(bd){
  if(!bd)return null;
  const now=new Date(); now.setHours(0,0,0,0);
  const [,mm,dd]=bd.split('-').map(Number);
  let next=new Date(now.getFullYear(),mm-1,dd);
  if(next<now)next=new Date(now.getFullYear()+1,mm-1,dd);
  return Math.round((next-now)/86400000);
}
function bdayBadge(bd){
  const d=daysToBirthday(bd);
  if(d===null)return '<span style="color:var(--muted)">—</span>';
  if(d===0)return '<span class="badge b-gold">🎂 היום!</span>';
  if(d<=7)return `<span class="badge b-gold">בעוד ${d} ימים</span>`;
  return `<span style="color:var(--muted);font-size:12.5px">${fmtDate(bd).slice(0,5)} · בעוד ${d} ימים</span>`;
}

  return state.vacations.filter(v=>v.endDate>=nowS&&v.startDate<=limS)
    .sort((a,b)=>a.startDate.localeCompare(b.startDate));

function readFileInput(input){
  return new Promise(res=>{
    const f=input?.files?.[0];
    if(!f){res(undefined);return}
    if(f.size>2.5*1024*1024){toast('קובץ גדול מדי (מקסימום 2.5MB בשלב הדמו)','err');res(undefined);return}
    const r=new FileReader();
    r.onload=()=>res({name:f.name,type:f.type,data:r.result});
    r.readAsDataURL(f);
  });
}

function periodStats(p){
  const inP=d=>p==='all'||d.slice(0,7)===p;
  const hrs=state.hours.filter(h=>inP(h.date));
  const pays=state.payments.filter(x=>inP(x.date));
  const totH=hrs.reduce((s,h)=>s+h.hours,0);
  const billH=hrs.filter(h=>h.billable).reduce((s,h)=>s+h.hours,0);
  return {
    hours:totH, billable:billH,
    paid:pays.filter(x=>x.status==='שולם').reduce((s,x)=>s+x.amount,0),
    pending:pays.filter(x=>x.status==='ממתין').reduce((s,x)=>s+x.amount,0),
    late:pays.filter(x=>x.status==='באיחור').reduce((s,x)=>s+x.amount,0)
  };
}
function deltaHTML(cur,prev,isMoney){
  if(period==='all')return '';
  if(prev===0&&cur===0)return '<div class="delta flat">ללא שינוי</div>';
  if(prev===0)return '<div class="delta up">▲ חדש החודש</div>';
  const pct=Math.round((cur-prev)/prev*100);
  if(pct===0)return '<div class="delta flat">ללא שינוי מהחודש הקודם</div>';
  const up=pct>0;
  return `<div class="delta ${up?'up':'down'}">${up?'▲':'▼'} ${Math.abs(pct)}% מהחודש הקודם</div>`;
}

function drawDashboardCharts(admin){
  const INK='#152532',GOLD='#c9a03a',PETROL='#1f6f6b';
  Chart.defaults.font.family="'Heebo',sans-serif";
  // trend — always across all months
  const months=monthsList().slice().reverse();
  const hByM=months.map(m=>state.hours.filter(h=>h.date.startsWith(m)).reduce((s,h)=>s+h.hours,0));
  const payByM=months.map(m=>state.payments.filter(p=>p.date.startsWith(m)&&p.status==='שולם').reduce((s,p)=>s+p.amount,0));
  const dsets=[{type:'bar',label:'שעות',data:hByM,backgroundColor:'#1f6f6bcc',yAxisID:'y',borderRadius:5}];
  if(admin)dsets.push({type:'line',label:'הכנסות (₪)',data:payByM,borderColor:GOLD,backgroundColor:GOLD,yAxisID:'y1',tension:.3,pointRadius:4});
  charts.push(new Chart(document.getElementById('chTrend'),{data:{labels:months.map(monthLabel),datasets:dsets},
    options:{responsive:true,maintainAspectRatio:false,scales:{y:{position:'right',title:{display:true,text:'שעות'}},...(admin?{y1:{position:'left',grid:{drawOnChartArea:false},ticks:{callback:v=>'₪'+(v/1000)+'K'}}}:{})} ,plugins:{legend:{rtl:true,labels:{usePointStyle:true}}}}}));
  // by employee — respects period
  const emps=state.employees.filter(e=>e.status==='פעיל');
  const eH=emps.map(e=>state.hours.filter(h=>h.employeeId===e.id&&inPeriod(h.date)).reduce((s,h)=>s+h.hours,0));
  charts.push(new Chart(document.getElementById('chEmp'),{type:'bar',data:{labels:emps.map(e=>e.firstName+' '+e.lastName),datasets:[{data:eH,backgroundColor:[INK,PETROL,GOLD,'#2b6cb0','#6b46c1'],borderRadius:6}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}}));
  // payments pie
  if(admin){
    const s=periodStats(period);
    charts.push(new Chart(document.getElementById('chPay'),{type:'doughnut',data:{labels:['שולם','ממתין','באיחור'],datasets:[{data:[s.paid,s.pending,s.late],backgroundColor:['#1e8e5a','#e0b13c','#c0392b']}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{rtl:true,position:'bottom',labels:{usePointStyle:true}},tooltip:{callbacks:{label:c=>c.label+': '+fmtMoney(c.parsed)}}}}}));
  }
  // by client — horizontal, sorted desc
  const cl=state.clients.map(c=>({n:c.name,h:state.hours.filter(h=>h.clientId===c.id&&inPeriod(h.date)).reduce((s,h)=>s+h.hours,0)})).filter(x=>x.h>0).sort((a,b)=>b.h-a.h);
  charts.push(new Chart(document.getElementById('chClient'),{type:'bar',data:{labels:cl.map(x=>x.n),datasets:[{data:cl.map(x=>x.h),backgroundColor:PETROL,borderRadius:6}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}}));
}

function delEmployee(id){
  if(!isAdmin())return;
  const e=state.employees.find(x=>x.id===id);
  const hrs=state.hours.filter(h=>h.employeeId===id).length;
  confirmDelete(`למחוק את <b>${esc(e.firstName+' '+e.lastName)}</b>?${hrs?` יש לעובד ${hrs} רישומי שעות שיישארו במערכת.`:''}`,
    `()=>{delEmployeeDo('${id}')}`);
}
function delEmployeeDo(id){
  state.employees=state.employees.filter(x=>x.id!==id);
  const affected=state.clients.filter(c=>c.team.includes(id));
  affected.forEach(c=>c.team=c.team.filter(t=>t!==id));
  state.hours.forEach(h=>{if(h.employeeId===id)h.employeeId=null});
  state.vacations=state.vacations.filter(v=>v.employeeId!==id);
  bg((async()=>{
    for(const cl of affected)await dbUpdate('clients',cl.id,{team:cl.team});
    await dbDelete('employees',id);
  })());
}

/* --- vacations --- */
function openVacationForm(empId){
  const t=todayISO();
  openModal('סימון חופשה / היעדרות',`
    <div class="form-grid">
      <div class="full"><label class="req">עובד</label><select id="f_vemp">${state.employees.filter(e=>e.status==='פעיל').map(e=>`<option value="${e.id}" ${empId===e.id?'selected':''}>${esc(e.firstName)} ${esc(e.lastName)}</option>`).join('')}</select></div>
      <div><label class="req">סוג היעדרות</label><select id="f_vtype">${VAC_TYPES.map(s=>`<option>${s}</option>`).join('')}</select></div>
      <div></div>
      <div><label class="req">מתאריך</label><input id="f_vfrom" type="date" value="${t}"></div>
      <div><label class="req">עד תאריך (כולל)</label><input id="f_vto" type="date" value="${t}"></div>
      <div class="full"><label>הערות</label><input id="f_vnotes" placeholder="למשל: חופשה משפחתית, זמין בטלפון לדחוף"></div>
      <div class="full" id="f_vsummary" style="font-size:13px;color:var(--muted)"></div>
    </div>`,
    ()=>{
      const from=val('f_vfrom'),to=val('f_vto');
      if(!from||!to){toast('יש להזין תאריך התחלה וסיום','err');return false}
      if(to<from){toast('תאריך הסיום קודם לתאריך ההתחלה','err');return false}
      const eId=val('f_vemp');
      const overlap=state.vacations.find(v=>v.employeeId===eId&&v.startDate<=to&&v.endDate>=from);
      if(overlap){toast(`חופפת להיעדרות קיימת (${fmtDate(overlap.startDate)}–${fmtDate(overlap.endDate)})`,'err');return false}
      const nid=uid();
      const rec={id:nid,employeeId:eId,type:val('f_vtype'),startDate:from,endDate:to,notes:val('f_vnotes')};
      state.vacations.push(rec);bg(dbInsert('vacations',rec));
      toast('ההיעדרות נרשמה: '+empName(eId)+', '+fmtDate(from)+'–'+fmtDate(to));
    });
  // live day counter
  const upd=()=>{
    const f=val('f_vfrom'),tt=val('f_vto');
    const el=document.getElementById('f_vsummary');
    if(f&&tt&&tt>=f){const d=Math.round((new Date(tt)-new Date(f))/86400000)+1;el.textContent=`סה"כ ${d} ימים (כולל שני הקצוות)`}
    else el.textContent='';
  };
  document.getElementById('f_vfrom').addEventListener('change',upd);
  document.getElementById('f_vto').addEventListener('change',upd);
  upd();
}
function delVacation(vid,empId){
  if(!can('vacations','edit')){toast('אין לך הרשאה למחוק היעדרויות','err');return}
  state.vacations=state.vacations.filter(v=>v.id!==vid);
  bg(dbDelete('vacations',vid));
  save();closeModal();render();if(empId)openEmployeeCard(empId);
  toast('ההיעדרות נמחקה');
}

/* ================= CANDIDATES (CV bank) ================= */
const CAND_STATUSES=['חדש','נבדק','זומן לראיון','הושם','במאגר','לא רלוונטי'];
let candSearch='',candFieldFilter='all',candStFilter='all',candSkillFilter=[],candSkillChips=[];
function candBadge(s){return {'חדש':'b-blue','נבדק':'b-purple','זומן לראיון':'b-yellow','הושם':'b-green','במאגר':'b-gold','לא רלוונטי':'b-gray'}[s]||'b-gray'}
function topCandSkills(n){
  const freq={};
  state.candidates.forEach(c=>(c.skills||[]).forEach(s=>{const k=(s||'').trim();if(k)freq[k]=(freq[k]||0)+1}));
  return Object.keys(freq).sort((a,b)=>freq[b]-freq[a]).slice(0,n);
}
function candFilteredList(){
  const q=candSearch.trim().toLowerCase();
  return state.candidates.filter(c=>{
    if(q){const t=(c.name+' '+(c.field||'')+' '+(c.skills||[]).join(' ')+' '+(c.notes||'')+' '+(c.phone||'')+' '+(c.email||'')).toLowerCase();if(!t.includes(q))return false}
    if(candFieldFilter!=='all'&&c.field!==candFieldFilter)return false;
    if(candStFilter!=='all'&&c.status!==candStFilter)return false;
    if(candSkillFilter.length){const cs=(c.skills||[]).map(s=>s.toLowerCase());if(!candSkillFilter.every(f=>cs.some(s=>s.includes(f.toLowerCase()))))return false}
    return true;
  });
}
function candRowsHtml(list){
  return list.length?list.map(c=>`
        <tr>
          <td><b>${esc(c.name)}</b><div style="font-size:12px;color:var(--muted)" dir="ltr">${esc(c.phone||'')}</div></td>
          <td>${esc(c.field)}</td>
          <td>${c.experience?c.experience+' שנים':'—'}</td>
          <td style="max-width:220px">${c.skills.map(s=>`<span class="tag">${esc(s)}</span>`).join('')||'—'}</td>
          <td><span class="badge b-gray">${esc(c.source||'—')}</span></td>
          <td>${c.cvFile?fileChip(c.cvFile):'<span style="color:var(--muted)">—</span>'}</td>
          <td><select class="inline-status" onchange="setCandStatus('${c.id}',this.value)">${CAND_STATUSES.map(s=>`<option ${c.status===s?'selected':''}>${s}</option>`).join('')}</select></td>
          <td><button class="icon-btn" onclick="openCandidateForm('${c.id}')">✏️</button><button class="icon-btn" onclick="delCandidate('${c.id}')">🗑️</button></td>
        </tr>`).join(''):`<tr><td colspan="8"><div class="empty-state"><div class="big">📄</div>לא נמצאו מועמדים תואמים</div></td></tr>`;
}

}

/* --- Excel import --- */
function downloadHoursTemplate(){
  const ws=XLSX.utils.aoa_to_sheet([
    ['עובד','לקוח','תאריך','שעות','תיאור','לחיוב'],
    ['אוראל מזרחי','דוד אברהמי','2026-07-01',3.5,'ליווי שוטף','כן'],
    ['רונן לוי','מיכל שרון','2026-07-02',2,'דוח תזרים','כן']
  ]);
  ws['!cols']=[{wch:16},{wch:18},{wch:12},{wch:8},{wch:28},{wch:8}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'שעות');
  XLSX.writeFile(wb,'תבנית-שעות-מנוף.xlsx');
  toast('התבנית ירדה — ממלאים ומייבאים חזרה');
}
function normalizeName(s){return String(s||'').replace(/["'״׳]/g,'').replace(/\s+/g,' ').trim().toLowerCase()}
function matchEmployee(name){
  const n=normalizeName(name); if(!n)return null;
  return state.employees.find(e=>{
    const full=normalizeName(e.firstName+' '+e.lastName);
    return full===n||full.includes(n)||n.includes(normalizeName(e.firstName))&&n.includes(normalizeName(e.lastName))||normalizeName(e.firstName)===n;
  })||null;
}
function matchClient(name){
  const n=normalizeName(name); if(!n)return null;
  return state.clients.find(c=>{
    const nm=normalizeName(c.name), co=normalizeName(c.company||'');
    return nm===n||nm.includes(n)||n.includes(nm)||(co&&(co===n||co.includes(n)||n.includes(co)));
  })||null;
}
function excelDate(v){
  if(v==null||v==='')return '';
  if(typeof v==='number'){const d=XLSX.SSF.parse_date_code(v);if(d)return `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`}
  const s=String(v).trim();
  let m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/); if(m)return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  m=s.match(/^(\d{1,2})[./](\d{1,2})[./](\d{2,4})/); if(m){const y=m[3].length===2?'20'+m[3]:m[3];return `${y}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`}
  return '';
}
function openImportModal(){
  openModal('ייבוא שעות מאקסל',`
    <p style="font-size:13.5px;color:var(--muted);margin-bottom:12px">קובץ xlsx / xls / csv עם העמודות: <b>עובד, לקוח, תאריך, שעות, תיאור, לחיוב</b>. המערכת מזהה עובד ולקוח לפי השם בהתאמה גמישה (גם שם חברה עובד).</p>
    <div class="import-zone">
      <div style="font-size:30px;margin-bottom:6px">📥</div>
      <input type="file" id="importFile" accept=".xlsx,.xls,.csv" style="max-width:300px;margin:0 auto">
    </div>
    <div id="importResult" style="margin-top:14px"></div>`,null,
    {extraFoot:`<button class="btn btn-primary" onclick="runImport()">בצע ייבוא</button>`});
}
function runImport(){
  const inp=document.getElementById('importFile');
  const f=inp?.files?.[0];
  if(!f){toast('יש לבחור קובץ תחילה','err');return}
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
      let ok=0; const skipped=[]; const imported=[];
      rows.forEach((r,i)=>{
        const keys=Object.keys(r);
        const get=(...names)=>{const k=keys.find(k=>names.some(n=>normalizeName(k).includes(n)));return k?r[k]:''};
        const empRaw=get('עובד'), cliRaw=get('לקוח'), dtRaw=get('תאריך'), hrRaw=get('שעות'), ds=get('תיאור'), blRaw=String(get('לחיוב','חיוב')).trim();
        const emp=matchEmployee(empRaw), cli=matchClient(cliRaw);
        const date=excelDate(dtRaw), hrs=parseFloat(hrRaw);
        if(!emp){skipped.push(`שורה ${i+2}: עובד לא זוהה ("${esc(String(empRaw))}")`);return}
        if(!cli){skipped.push(`שורה ${i+2}: לקוח לא זוהה ("${esc(String(cliRaw))}")`);return}
        if(!date||isNaN(hrs)||hrs<0.25){skipped.push(`שורה ${i+2}: תאריך או שעות לא תקינים`);return}
        const rec={id:uid(),employeeId:emp.id,clientId:cli.id,date,hours:hrs,description:String(ds||''),billable:!['לא','no','0','false'].includes(blRaw.toLowerCase())};
        state.hours.push(rec);imported.push(rec);
        ok++;
      });
      save();
      if(imported.length)bg(dbBulkInsert('hours',imported));
      document.getElementById('importResult').innerHTML=`
        <div class="badge b-green" style="font-size:13px">✓ יובאו ${ok} רשומות</div>
        ${skipped.length?`<div class="badge b-yellow" style="font-size:13px;margin-right:8px">דולגו ${skipped.length}</div>
        <ul style="margin-top:10px;font-size:12.5px;color:var(--muted);padding-right:18px">${skipped.slice(0,8).map(s=>`<li>${s}</li>`).join('')}${skipped.length>8?'<li>…ועוד</li>':''}</ul>`:''}`;
      toast(`ייבוא הושלם: ${ok} רשומות${skipped.length?', '+skipped.length+' דולגו':''}`);
      if(ok&&!skipped.length)setTimeout(()=>{closeModal();render()},1400);
    }catch(err){toast('שגיאה בקריאת הקובץ — ודאו שזה קובץ אקסל תקין','err')}
  };
  reader.readAsArrayBuffer(f);
}

    [16,10,12,12,8,30]);
  XLSX.writeFile(wb,`גיבוי-מנוף-CRM-${stamp()}.xlsx`);
  markBackup();
  toast('קובץ הגיבוי ירד — 7 גיליונות, כל הנתונים');
}

function exportBackupJSON(){
  if(!can('backup'))return;
  const blob=new Blob([JSON.stringify({exportedAt:new Date().toISOString(),version:1,data:state},null,1)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`גיבוי-מלא-מנוף-CRM-${stamp()}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  markBackup();
  toast('גיבוי JSON מלא ירד — כולל קבצים מצורפים');
}

    <div id="restoreResult" style="margin-top:10px;font-size:13px"></div>`,null);

function runRestore(){
  const f=document.getElementById('restoreFile')?.files?.[0];
  if(!f){toast('יש לבחור קובץ גיבוי JSON','err');return}
  const r=new FileReader();
  r.onload=e=>{
    try{
      const parsed=JSON.parse(e.target.result);
      const d=parsed.data||parsed;
      const need=['employees','clients','leads','candidates','hours','payments'];
      if(!need.every(k=>Array.isArray(d[k]))){toast('הקובץ אינו גיבוי תקין של מערכת מנוף','err');return}
      if(!d.vacations)d.vacations=[];
      cloudRestore(d);
    }catch(err){toast('שגיאה בקריאת קובץ הגיבוי','err')}
  };
  r.readAsText(f);
}

async function cloudRestore(d){
  const out=document.getElementById('restoreResult');
  out.innerHTML='☁️ משחזר לענן… נא לא לסגור את החלון';
  try{
    for(const t of ['vacations','hours','payments','clients','leads','candidates','employees'])
      await sb.from(t).delete().neq('id','__none__');
    await dbBulkInsert('employees',d.employees);
    if(d.employees.length){
      const {error}=await sb.from('employee_salaries').upsert(d.employees.map(e=>({employee_id:e.id,salary:e.salary||0,bonus:e.bonus||0})));
      if(error)throw error;
    }
    for(const t of ['clients','leads','candidates','hours','payments','vacations'])
      await dbBulkInsert(t,d[t]||[]);
    await loadAll(); closeModal(); render();
    toast(`שוחזר בהצלחה: ${d.employees.length} עובדים, ${d.clients.length} לקוחות, ${d.hours.length} רישומי שעות`);
  }catch(e){out.innerHTML='<span style="color:var(--red)">שגיאה בשחזור: '+esc(e.message||String(e))+'</span>'}
}

function openEditUserPerms(email){
  if(!isSuperAdmin())return;
  const u=(state.appUsers||[]).find(x=>x.email===email); if(!u)return;
  let perms; try{perms=u.permissions?JSON.parse(u.permissions):defaultPerms(u.role)}catch(e){perms=defaultPerms(u.role)}
  const mods=[
    {k:'dashboard',label:'דשבורד',actions:[{a:'view',l:'צפייה'},{a:'financials',l:'נתונים כספיים'}]},
    {k:'employees',label:'עובדים',actions:[{a:'view',l:'צפייה'},{a:'edit',l:'עריכה'},{a:'salaries',l:'צפייה בשכר'}]},
    {k:'clients',label:'לקוחות',actions:[{a:'view',l:'צפייה'},{a:'edit',l:'עריכה'}]},
    {k:'leads',label:'לידים',actions:[{a:'view',l:'צפייה'},{a:'edit',l:'עריכה'}]},
    {k:'candidates',label:'מאגר קו"ח',actions:[{a:'view',l:'צפייה'},{a:'edit',l:'עריכה'}]},
    {k:'hours',label:'שעות',actions:[{a:'view',l:'צפייה'},{a:'edit',l:'עריכה'}]},
    {k:'payments',label:'תשלומים',actions:[{a:'view',l:'צפייה'},{a:'edit',l:'עריכה'}]},
    {k:'vacations',label:'חופשות',actions:[{a:'view',l:'צפייה'},{a:'edit',l:'עריכה (מחיקה)'}]},
    {k:'users',label:'ניהול משתמשים',actions:[{a:'view',l:'צפייה'},{a:'edit',l:'עריכה + הזמנה'}]}
  ];
  const rows=mods.map(m=>{
    const mp=perms[m.k]||{};
    const isB=typeof mp==='boolean';
    return `<tr><td style="font-weight:700">${m.label}</td>${m.actions.map(ac=>{
      const checked=isB?mp:!!mp[ac.a];
      return `<td style="text-align:center"><label style="cursor:pointer;margin:0"><input type="checkbox" class="perm-chk" data-mod="${m.k}" data-act="${ac.a}" style="width:auto" ${checked?'checked':''}> ${ac.l}</label></td>`;
    }).join('')}${m.actions.length<3?'<td></td>'.repeat(3-m.actions.length):''}</tr>`;
  }).join('');
  openModal(`הרשאות — ${esc(u.name)} (${roleLabel(u.role)})`,`
    <p style="font-size:13px;color:var(--muted);margin-bottom:14px">סמנו בדיוק מה המשתמש יכול לראות ולעשות. שינויים ייכנסו לתוקף בכניסה הבאה שלו.</p>

    </div>`,
    async ()=>{
      const newPerms={};
      document.querySelectorAll('.perm-chk').forEach(cb=>{
        const mod=cb.dataset.mod, act=cb.dataset.act;
        if(mod==='backup'){newPerms.backup=cb.checked;return}
        if(!newPerms[mod])newPerms[mod]={};
        newPerms[mod][act]=cb.checked;
      });
      const {error}=await sb.from('app_users').update({permissions:JSON.stringify(newPerms)}).eq('email',email);
      if(error){toast('שגיאה: '+error.message,'err');return false}
      await loadAppUsers();
      if(email===session.email){session.perms=newPerms;renderNav();}
      toast('ההרשאות של '+u.name+' עודכנו');
    },{saveLabel:'שמור הרשאות',wide:true});
}
function resetPermsToRole(role){
  const dp=defaultPerms(role);
  document.querySelectorAll('.perm-chk').forEach(cb=>{
    const mod=cb.dataset.mod, act=cb.dataset.act;
    if(mod==='backup'){cb.checked=!!dp.backup;return}
    const m=dp[mod]; cb.checked=typeof m==='boolean'?m:!!m?.[act];
  });
  toast('אופסו לברירת מחדל של '+roleLabel(role));
}

async function toggleUserStatus(email){

  const {error}=await sb.from('app_users').update({status:newSt}).eq('email',email);
  if(error){toast('שגיאה: '+error.message,'err');return}
  await loadAppUsers(); render();
  toast(u.name+' '+( newSt==='מושבת'?'הושבת':'הופעל'));
}

async function loadAppUsers(){
  const {data}=await sb.from('app_users').select('*');
  state.appUsers=(data||[]).sort((a,b)=>{
    const order={'סופר אדמין':0,'אדמין':1,'מנהל צוות':2,'עובד':3,'צופה':4};
    return (order[a.role]??5)-(order[b.role]??5);
  });
}

(async function(){
  if(SUPABASE_URL.startsWith('PASTE'))return;
  try{
    const {data}=await sb.auth.getSession();
    const em=data?.session?.user?.email;
    if(em)await initSession(em.toLowerCase());
  }catch(e){console.warn(e)}
})();
</script>
